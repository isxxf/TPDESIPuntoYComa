<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar publicación</title>
</head>
<body>
<h1>Editar publicación</h1>
<form th:action="@{/publicaciones/modificar-publicacion/{id}(id=${publicacion.id})}" th:object="${publicacion}" method="post">
  <input type="hidden" th:field="*{id}">
  <input type="hidden" th:field="*{fechaPublicacion}"> <input type="hidden" th:field="*{eliminada}">        <input type="hidden" th:field="*{propiedad.id}">     <div>
  <label>Precio mensual ($):</label>
  <input type="number" step="0.01" th:field="*{precioMensual}" required>
</div>
  <br>
  <div>
    <label for="estado">Estado de la Publicación:</label>
    <select id="estado" th:field="*{estado}" required>
      <option value="ACTIVA">Activa</option>
      <option value="PAUSADA">Pausada</option>
      <option value="FINALIZADA">Finalizada</option>
    </select>
  </div>
  <div>
    <label>Condiciones:</label><br>
    <textarea th:field="*{condiciones}" rows="3" cols="40" required></textarea>
  </div>
  <br>
  <div>
    <label>Descripción:</label><br>
    <textarea th:field="*{descripcion}" rows="3" cols="40" required></textarea>
  </div>
  <br>
  <button type="submit">Guardar cambios</button>
  <a th:href="@{/publicaciones}">Cancelar</a>
</form>
</body>
</html>
