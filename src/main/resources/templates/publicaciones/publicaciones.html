<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Publicaciones</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            font-size: 14px;
            background: #f4f6f8;
            color: #333;
            padding: 24px;
        }

        h1 { font-size: 24px; margin-bottom: 20px; color: #2c3e50; }
        h2 { font-size: 16px; margin-bottom: 12px; color: #2c3e50; }

        .card {
            background: #fff;
            border: 1px solid #dde1e7;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
        }

        /* Mensajes */
        .msg-exito {
            background: #d1e7dd;
            border: 1px solid #a3cfbb;
            color: #0f5132;
            padding: 10px 14px;
            border-radius: 4px;
            margin-bottom: 16px;
        }
        .msg-error {
            background: #fdecea;
            border: 1px solid #f5c6cb;
            color: #c0392b;
            padding: 10px 14px;
            border-radius: 4px;
            margin-bottom: 16px;
        }

        /* Filtros */
        .filtros-grupo { display: flex; flex-direction: column; gap: 4px; }
        .filtros-grupo label { font-weight: bold; font-size: 13px; }
        .filtros-grupo select,
        .filtros-grupo input {
            padding: 6px 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            min-width: 150px;
        }

        /* Formulario alta */
        .form-grid div {
            display: grid;
            grid-template-columns: 220px 1fr;
            align-items: start;
            gap: 8px;
            margin-bottom: 10px;
            max-width: 620px;
        }
        .form-grid div label { font-weight: bold; padding-top: 6px; }
        .form-grid div input,
        .form-grid div select,
        .form-grid div textarea {
            padding: 6px 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 100%;
        }
        .form-grid div textarea { resize: vertical; min-height: 70px; }

        /* Botones */
        .btn {
            padding: 7px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary   { background: #2980b9; color: #fff; }
        .btn-secondary { background: #95a5a6; color: #fff; }
        .btn-danger    { background: #e74c3c; color: #fff; }
        .btn-small     { padding: 4px 10px; font-size: 12px; }
        .btn:hover     { opacity: .88; }

        .form-actions { display: flex; gap: 8px; margin-top: 12px; }

        /* Tabla */
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead tr { background: #2c3e50; color: #fff; }
        th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        tbody tr:hover { background: #f0f4f8; }

        /* Badges de estado */
        .badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
        }
        .badge-ACTIVA     { background: #d1e7dd; color: #0f5132; }
        .badge-PAUSADA    { background: #fef3cd; color: #856404; }
        .badge-FINALIZADA { background: #e2e3e5; color: #41464b; }

        .text-muted { color: #aaa; }
    </style>
</head>
<body>

<h1>Gestión de Publicaciones</h1>

<!-- MENSAJES -->
<div class="msg-exito" th:if="${mensajeExito}">
    <strong th:text="${mensajeExito}"></strong>
</div>
<div class="msg-error" th:if="${mensajeError}">
    <strong th:text="${mensajeError}"></strong>
</div>

<!-- ================================================================
     FILTROS
     ================================================================ -->
<div class="card">
    <h2>Filtrar Publicaciones</h2>
    <form th:action="@{/publicaciones}" method="get">
        <div style="display:flex; flex-wrap:wrap; gap:12px; align-items:flex-end;">
            <div class="filtros-grupo">
                <label for="propiedadId">Propiedad (ID)</label>
                <input type="number" id="propiedadId" name="propiedadId">
            </div>
            <div class="filtros-grupo">
                <label for="ciudad">Ciudad</label>
                <select id="ciudad" name="ciudad">
                    <option value="">Todas las ciudades</option>
                    <option th:each="c : ${ciudades}"
                            th:value="${c.nombre}"
                            th:text="${c.nombre}"></option>
                </select>
            </div>
            <div class="filtros-grupo">
                <label for="estado">Estado</label>
                <select id="estado" name="estado">
                    <option value="">Todos</option>
                    <option value="ACTIVA">Activa</option>
                    <option value="PAUSADA">Pausada</option>
                    <option value="FINALIZADA">Finalizada</option>
                </select>
            </div>
            <div class="filtros-grupo">
                <label for="precioMin">Precio mín.</label>
                <input type="number" step="0.01" id="precioMin" name="precioMin" style="min-width:110px;">
            </div>
            <div class="filtros-grupo">
                <label for="precioMax">Precio máx.</label>
                <input type="number" step="0.01" id="precioMax" name="precioMax" style="min-width:110px;">
            </div>
            <div style="display:flex; gap:8px;">
                <button type="submit" class="btn btn-primary">Buscar</button>
                <a th:href="@{/publicaciones}" class="btn btn-secondary">Limpiar</a>
            </div>
        </div>
    </form>
</div>

<!-- ================================================================
     LISTADO
     ================================================================ -->
<div class="card">
    <h2>Lista de Publicaciones</h2>
    <table>
        <thead>
            <tr>
                <th>Pub. ID</th>
                <th>Prop. ID</th>
                <th>Ciudad</th>
                <th>Dirección</th>
                <th>Precio mensual</th>
                <th>Estado</th>
                <th>Fecha pub.</th>
                <th>Condiciones</th>
                <th>Descripción</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="pub : ${publicaciones}">
                <td th:text="${pub.id}"></td>
                <td th:text="${pub.propiedad.id}"></td>
                <td th:text="${pub.propiedad.ciudad.nombre}"></td>
                <td th:text="${pub.propiedad.direccion}"></td>
                <td th:text="'$' + ${pub.precioMensual}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${'badge-' + pub.estado}"
                          th:text="${pub.estado}"></span>
                </td>
                <td th:text="${pub.fechaPublicacion}"></td>
                <td th:text="${pub.condiciones}"></td>
                <td th:text="${pub.descripcion}"></td>
                <td style="white-space:nowrap;">
                    <a th:href="@{/publicaciones/editar/{id}(id=${pub.id})}"
                       class="btn btn-primary btn-small">Editar</a>
                    <form th:action="@{/publicaciones/eliminar-publicacion/{id}(id=${pub.id})}"
                          method="post" style="display:inline;"
                          onsubmit="return confirm('¿Eliminar esta publicación?');">
                        <button type="submit" class="btn btn-danger btn-small">Eliminar</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(publicaciones)}">
                <td colspan="10" style="text-align:center; color:#999; padding:20px;">
                    No se encontraron publicaciones registradas.
                </td>
            </tr>
        </tbody>
    </table>
</div>

<!-- ================================================================
     REGISTRAR NUEVA PUBLICACIÓN
     ================================================================ -->
<div class="card">
    <h2>Registrar Nueva Publicación</h2>
    <form th:action="@{/publicaciones/crear-publicacion}" method="post">
        <div class="form-grid">
            <div>
                <label for="propiedad">Propiedad (*):</label>
                <select id="propiedad" name="propiedad.id" required>
                    <option value="" disabled selected>Seleccione una propiedad...</option>
                    <option th:each="prop : ${propiedadesDisponibles}"
                            th:if="${prop.estadoDisponibilidad.toString() == 'DISPONIBLE'}"
                            th:value="${prop.id}"
                            th:text="${prop.direccion + ' (' + prop.ciudad.nombre + ')'}">
                    </option>
                </select>
            </div>
            <div>
                <label for="precioMensual">Precio mensual ($) (*):</label>
                <input type="number" step="0.01" id="precioMensual" name="precioMensual" min="0.01" required>
            </div>
            <div>
                <label for="condiciones">Condiciones (*):</label>
                <textarea id="condiciones" name="condiciones" required rows="3"></textarea>
            </div>
            <div>
                <label for="descripcion">Descripción (*):</label>
                <textarea id="descripcion" name="descripcion" required rows="3"></textarea>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Guardar publicación</button>
        </div>
    </form>
</div>

</body>
</html>
