<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Publicaciones</title>
</head>
<body>
<h1>Gestión de Publicaciones</h1>
<div th:if="${mensajeExito}">
    <p><strong th:text="${mensajeExito}"></strong></p>
</div>
<div th:if="${mensajeError}">
    <p><strong th:text="${mensajeError}"></strong></p>
</div>
<hr>
<h2>Filtrar Publicaciones</h2>
<form th:action="@{/templates/publicaciones}" method="get">
    <label for="propiedadId">ID Propiedad:</label>
    <input type="number" id="propiedadId" name="propiedadId">
    <label for="ciudad">Ciudad:</label>
    <input type="text" id="ciudad" name="ciudad">
    <label for="estado">Estado:</label>
    <select id="estado" name="estado">
        <option value="">Todos</option>
        <option value="ACTIVA">Activa</option>
        <option value="PAUSADA">Pausada</option>
        <option value="FINALIZADA">Finalizada</option>
    </select>
    <label for="precioMin">Precio Mín:</label>
    <input type="number" step="0.01" id="precioMin" name="precioMin">
    <label for="precioMax">Precio Máx:</label>
    <input type="number" step="0.01" id="precioMax" name="precioMax">
    <button type="submit">Buscar</button>
    <a th:href="@{/templates/publicaciones}">Limpiar</a>
</form>

<hr>
<h2>Listado de Publicaciones</h2>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Dirección</th>
        <th>Ciudad</th>
        <th>Precio Mensual</th>
        <th>Fecha Pub.</th>
        <th>Estado</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="pub : ${publicaciones}">
        <td th:text="${pub.id}"></td>
        <td th:text="${pub.propiedad.direccion}"></td>
        <td th:text="${pub.propiedad.ciudad.nombre}"></td>
        <td th:text="'$' + ${pub.precioMensual}"></td>
        <td th:text="${pub.fechaPublicacion}"></td>
        <td th:text="${pub.estado}"></td>
        <td>
            <a th:href="@{/publicaciones/editar/{id}(id=${pub.id})}">Editar</a>
            <form th:action="@{/publicaciones/eliminar-publicacion/{id}(id=${pub.id})}" method="post" style="display:inline;">
                <button type="submit" onclick="return confirm('¿Estás seguro de que deseas eliminar esta publicación?');">Eliminar</button>
            </form>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(publicaciones)}">
        <td colspan="7">No se encontraron publicaciones registradas.</td>
    </tr>
    </tbody>
</table>
<hr>
<h2>Registrar Nueva Publicación</h2>
<form th:action="@{/publicaciones/crear-publicacion}" method="post">
    <div>
        <label for="propiedad.id">ID de Propiedad (*):</label>
        <input type="number" id="propiedad.id" name="propiedad.id" required>
    </div>
    <br>
    <div>
        <label for="precioMensual">Precio Mensual ($) (*):</label>
        <input type="number" step="0.01" id="precioMensual" name="precioMensual" required>
    </div>
    <br>
    <div>
        <label for="fechaPublicacion">Fecha de Publicación (*):</label>
        <input type="date" id="fechaPublicacion" name="fechaPublicacion" required>
    </div>
    <br>
    <div>
        <label for="condiciones">Condiciones (*):</label><br>
        <textarea id="condiciones" name="condiciones" rows="3" cols="40" required></textarea>
    </div>
    <br>
    <div>
        <label for="descripcion">Descripción (*):</label><br>
        <textarea id="descripcion" name="descripcion" rows="3" cols="40" required></textarea>
    </div>
    <br>
    <div>
        <button type="submit">Guardar Publicación</button>
    </div>
</form>
</body>
</html>
