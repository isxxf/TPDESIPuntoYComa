<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Publicaciones</title>
</head>
<body>
<h1>Gestión de Publicaciones</h1>
<div th:if="${mensajeExito}">
    <p><strong th:text="${mensajeExito}"></strong></p>
</div>
<div th:if="${mensajeError}">
    <p><strong th:text="${mensajeError}"></strong></p>
</div>
<hr>
<h2>Filtrar Publicaciones</h2>
<form th:action="@{/publicaciones}" method="get">
    <label for="propiedadId">Propiedad:</label>
    <select id="propiedadId" name="propiedadId">
        <option value="">Todas las propiedades</option>
        <option th:each="prop : ${propiedadesDisponibles}"
                th:value="${prop.id}"
                th:text="${prop.direccion + ' (' + prop.ciudad.nombre + ')'}"
                th:selected="${prop.id == filtroPropiedadId}">
        </option>
    </select>
    <label for="ciudad">Ciudad:</label>
    <select id="ciudad" name="ciudad">
        <option value="">Todas las ciudades</option>
        <option th:each="c : ${ciudades}"
                th:value="${c.nombre}"
                th:text="${c.nombre}"
                th:selected="${c.nombre == filtroCiudad}"></option>
    </select>
    <label for="estado">Estado:</label>
    <select id="estado" name="estado">
        <option value="">Todos</option>
        <option value="ACTIVA" th:selected="${filtroEstado != null and filtroEstado.name() == 'ACTIVA'}">Activa</option>
        <option value="PAUSADA" th:selected="${filtroEstado != null and filtroEstado.name() == 'PAUSADA'}">Pausada
        </option>
        <option value="FINALIZADA" th:selected="${filtroEstado != null and filtroEstado.name() == 'FINALIZADA'}">
            Finalizada
        </option>
    </select>
    <label for="precioMin">Precio Mín:</label>
    <input type="number" step="0.01" id="precioMin" name="precioMin" th:value="${filtroPrecioMin}">
    <label for="precioMax">Precio Máx:</label>
    <input type="number" step="0.01" id="precioMax" name="precioMax" th:value="${filtroPrecioMax}">
    <button type="submit">Buscar</button>
    <a th:href="@{/publicaciones}">Limpiar</a>
</form>

<hr>
<h2>Lista de Publicaciones</h2>
<table border="1">
    <thead>
    <tr>
        <th>Pub. ID</th>
        <th>Ciudad</th>
        <th>Dirección</th>
        <th>Precio Mensual</th>
        <th>Estado</th>
        <th>Fecha Pub.</th>
        <th>Condiciones</th>
        <th>Descripción</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="pub : ${publicaciones}">
        <td th:text="${pub.id}"></td>
        <td th:text="${pub.propiedad.ciudad.nombre}"></td>
        <td th:text="${pub.propiedad.direccion}"></td>
        <td th:text="'$' + ${pub.precioMensual}"></td>
        <td th:text="${pub.estado}"></td>
        <td th:text="${pub.fechaPublicacion}"></td>
        <td th:text="${pub.condiciones}"></td>
        <td th:text="${pub.descripcion}"></td>
        <td>
            <a th:href="@{/publicaciones/editar/{id}(id=${pub.id})}">Editar</a>
            <form th:action="@{/publicaciones/eliminar-publicacion/{id}(id=${pub.id})}" method="post"
                  style="display:inline;">
                <button type="submit"
                        onclick="return confirm('¿Estás seguro de que deseas eliminar esta publicación?');">Eliminar
                </button>
            </form>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(publicaciones)}">
        <td colspan="10">No se encontraron publicaciones registradas.</td>
    </tr>
    </tbody>
</table>
<hr>
<h2>Registrar Nueva Publicación</h2>
<form th:action="@{/publicaciones/crear-publicacion}" method="post">
    <div>
        <label for="propiedad">Seleccione la Propiedad (*):</label>
        <select id="propiedad" name="propiedad.id" required>
            <option value="" disabled selected>Seleccione una propiedad...</option>
            <option th:each="prop : ${propiedadesDisponibles}"
                    th:if="${prop.estadoDisponibilidad.toString() == 'DISPONIBLE'}"
                    th:value="${prop.id}"
                    th:text="${prop.direccion + ' (' + prop.ciudad.nombre + ')'}">
            </option>
        </select>
    </div>
    <br>
    <div>
        <label for="fechaPublicacion">Fecha de publicación (*):</label>
        <input type="date" id="fechaPublicacion" name="fechaPublicacion" th:value="${fechaHoy}" required>
    </div>
    <br>
    <div>
        <label for="precioMensual">Precio mensual ($) (*):</label>
        <input type="number" step="0.01" id="precioMensual" name="precioMensual" min="0.01" required>
    </div>
    <br>
    <div>
        <label for="estadoNuevo">Estado de la Publicación (*):</label>
        <select id="estadoNuevo" name="estado" required>
            <option value="ACTIVA" selected>Activa</option>
            <option value="PAUSADA">Pausada</option>
            <option value="FINALIZADA">Finalizada</option>
        </select>
    </div>
    <br>
    <div>
        <label for="condiciones">Condiciones (*):</label><br>
        <textarea id="condiciones" name="condiciones" required rows="3" cols="40"></textarea>
    </div>
    <br>
    <div>
        <label for="descripcion">Descripción (*):</label><br>
        <textarea id="descripcion" name="descripcion" required rows="3" cols="40"></textarea>
    </div>
    <br>
    <div>
        <button type="submit">Guardar publicación</button>
    </div>
</form>
</body>
</html>
