<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Listado de Propiedades</title>
</head>
<body>
    <h1>Propiedades</h1>
    <a th:href="@{/propiedades/nuevo}">Nueva Propiedad</a>
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Dirección</th>
                <th>Ciudad</th>
                <th>Tipo</th>
                <th>Ambientes</th>
                <th>Metros Cuadrados</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="propiedad : ${propiedades}">
                <td th:text="${propiedad.id}"></td>
                <td th:text="${propiedad.direccion}"></td>
                <td th:text="${propiedad.ciudad.nombre}"></td>
                <td th:text="${propiedad.tipo}"></td>
                <td th:text="${propiedad.cantidadAmbientes}"></td>
                <td th:text="${propiedad.metrosCuadrados}"></td>
                <td th:text="${propiedad.estadoDisponibilidad}"></td>
                <td>
                    <a th:href="@{'/propiedades/editar/' + ${propiedad.id}}">Editar</a> |
                    <a th:href="@{'/propiedades/eliminar/' + ${propiedad.id}}"
                       onclick="return confirm('¿Seguro que desea eliminar?');">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
