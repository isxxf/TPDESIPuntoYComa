
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Facturas</title>
</head>
<body>
 
<h1>Facturas</h1>
 
<!-- ================================================================
     MENSAJE DE ERROR
     ================================================================ -->
<div th:if="${error}" style="color:red; border:1px solid red; padding:8px; margin-bottom:12px;">
    <strong>Error:</strong> <span th:text="${error}"></span>
</div>
 
<!-- ================================================================
     FORMULARIO ALTA / EDICIÓN (HU 4.1 y 4.2)
     ================================================================ -->
<h2 th:text="${factura.id == null} ? 'Alta de Factura' : 'Edición de Factura'"></h2>
 
<form th:action="@{/facturas/guardar}" th:object="${factura}" method="post">
    <input type="hidden" th:field="*{id}" />
 
    <!-- Contrato: solo lectura si es edición (no se puede cambiar) -->
    <div th:if="${factura.id == null}">
        <label>Contrato asociado:</label>
        <select name="contrato.id" required>
            <option value="">-- Seleccione un contrato activo --</option>
            <option th:each="c : ${contratosActivos}"
                    th:value="${c.id}"
                    th:text="${'#' + c.id + ' - ' + c.propiedad.direccion + ' | Inquilino: ' + c.inquilino.nombre + ' ' + c.inquilino.apellido}">
            </option>
        </select>
    </div>
    <div th:if="${factura.id != null}">
        <label>Contrato asociado:</label>
        <input type="text"
               th:value="${'#' + factura.contrato.id + ' - ' + factura.contrato.propiedad.direccion}"
               readonly />
        <input type="hidden" name="contrato.id" th:value="${factura.contrato.id}" />
    </div>
 
    <div>
        <label>Concepto facturado:</label>
        <input type="text" th:field="*{conceptoFacturado}" maxlength="500" required />
    </div>
 
    <div>
        <label>Fecha de emisión:</label>
        <input type="date" th:field="*{fechaEmision}" required />
    </div>
 
    <div>
        <label>Fecha de vencimiento:</label>
        <input type="date" th:field="*{fechaVencimiento}" required />
    </div>
 
    <div>
        <label>Importe:</label>
        <input type="number" th:field="*{importe}" min="0.01" step="0.01" required />
    </div>
 
    <!-- Estado: en alta se muestra solo PENDIENTE; en edición se muestran las transiciones -->
    <div>
        <label>Estado:</label>
        <select th:field="*{estado}" id="estadoSelect" required onchange="togglePago()">
            <option th:if="${factura.id == null}" value="PENDIENTE">Pendiente</option>
            <option th:if="${factura.id != null}"
                    th:each="e : ${estadosFactura}"
                    th:value="${e}"
                    th:text="${e}">
            </option>
        </select>
    </div>
 
    <!-- Datos de pago (visibles solo cuando estado = PAGADA) -->
    <fieldset id="datosPago">
        <legend>Datos de pago (obligatorios si estado es PAGADA)</legend>
 
        <div>
            <label>Fecha de pago:</label>
            <input type="date" th:field="*{fechaPago}" />
        </div>
 
        <div>
            <label>Medio de pago:</label>
            <select th:field="*{medioPago}">
                <option value="">-- Sin medio de pago --</option>
                <option th:each="m : ${mediosPago}"
                        th:value="${m}"
                        th:text="${m}">
                </option>
            </select>
        </div>
 
        <div>
            <label>Importe pagado:</label>
            <input type="number" th:field="*{importePagado}" min="0.01" step="0.01" />
        </div>
 
        <div>
            <label>Interés (opcional):</label>
            <input type="number" th:field="*{interes}" min="0" step="0.01" />
        </div>
    </fieldset>
 
    <div>
        <button type="submit">Guardar</button>
        <a th:href="@{/facturas}">Cancelar</a>
    </div>
</form>
 
<hr />
 
<!-- ================================================================
     FILTROS (HU 4.4)
     ================================================================ -->
<h2>Filtrar facturas</h2>
<form method="get" th:action="@{/facturas}">
    <div>
        <label>Estado:</label>
        <select name="estado">
            <option value="">-- Todos --</option>
            <option th:each="e : ${estadosFactura}"
                    th:value="${e}"
                    th:text="${e}"
                    th:selected="${e == filtroEstado}">
            </option>
        </select>
    </div>
 
    <div>
        <label>Contrato:</label>
        <select name="contratoId">
            <option value="">-- Todos --</option>
            <option th:each="c : ${todosLosContratos}"
                    th:value="${c.id}"
                    th:text="${'#' + c.id + ' - ' + c.propiedad.direccion}"
                    th:selected="${c.id == filtroContratoId}">
            </option>
        </select>
    </div>
 
    <div>
        <label>Vencimiento desde:</label>
        <input type="date" name="fechaDesde" th:value="${filtroFechaDesde}" />
    </div>
 
    <div>
        <label>Vencimiento hasta:</label>
        <input type="date" name="fechaHasta" th:value="${filtroFechaHasta}" />
    </div>
 
    <button type="submit">Filtrar</button>
    <a th:href="@{/facturas}">Limpiar filtros</a>
</form>
 
<hr />
 
<!-- ================================================================
     LISTADO (HU 4.4)
     ================================================================ -->
<h2>Listado de Facturas</h2>
<a th:href="@{/facturas/nuevo}">Nueva Factura</a>
 
<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Contrato</th>
            <th>Propiedad</th>
            <th>Inquilino</th>
            <th>Concepto</th>
            <th>Fecha Emisión</th>
            <th>Fecha Vencimiento</th>
            <th>Importe</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="f : ${facturas}">
            <td th:text="${f.id}"></td>
            <td th:text="${'#' + f.contrato.id}"></td>
            <td th:text="${f.contrato.propiedad.direccion}"></td>
            <td th:text="${f.contrato.inquilino.nombre + ' ' + f.contrato.inquilino.apellido}"></td>
            <td th:text="${f.conceptoFacturado}"></td>
            <td th:text="${f.fechaEmision}"></td>
            <td th:text="${f.fechaVencimiento}"></td>
            <td th:text="${f.importe}"></td>
            <td th:text="${f.estado}"></td>
            <td>
                <a th:href="@{'/facturas/editar/' + ${f.id}}">Editar</a> |
                <form th:action="@{'/facturas/eliminar/' + ${f.id}}"
                      method="post"
                      style="display:inline"
                      onsubmit="return confirm('¿Confirma la eliminación de la factura #' + /*[[${f.id}]]*/ '?');">
                    <button type="submit">Eliminar</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(facturas)}">
            <td colspan="10">No hay facturas para mostrar.</td>
        </tr>
    </tbody>
</table>
 
<!-- ================================================================
     SCRIPT: mostrar/ocultar datos de pago según estado
     ================================================================ -->
<script>
    function togglePago() {
        var estado = document.getElementById('estadoSelect').value;
        var seccion = document.getElementById('datosPago');
        seccion.style.display = (estado === 'PAGADA') ? 'block' : 'none';
    }
    // Ejecutar al cargar para respetar el estado actual en edición
    document.addEventListener('DOMContentLoaded', togglePago);
</script>
 
</body>
</html>
